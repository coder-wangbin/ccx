version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Builds the application for Windows
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          PRODUCTION:
            ref: .PRODUCTION
      - task: common:generate:icons
    cmds:
      - task: generate:syso
        vars:
          ARCH:
            ref: .ARCH
      - go build {{.BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.APP_NAME}}.exe
      - cmd: powershell Remove-item *.syso
        platforms: [windows]
      - cmd: rm -f *.syso
        platforms: [linux, darwin]
    vars:
      VERSION_LDFLAGS: '-X main.Version={{.BUILD_VERSION | default "dev"}} -X main.BuildTime={{.BUILD_TIME | default "unknown"}} -X main.GitCommit={{.GIT_COMMIT | default "unknown"}} -X main.Distribution={{.DISTRIBUTION | default "github"}}'
      BUILD_FLAGS: '{{if eq .PRODUCTION "true"}}-tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui {{.VERSION_LDFLAGS}}"{{else}}-buildvcs=false -gcflags=all="-l" -ldflags="{{.VERSION_LDFLAGS}}"{{end}}'
    env:
      GOOS: windows
      CGO_ENABLED: 0
      GOARCH: '{{.ARCH}}'
      PRODUCTION: '{{.PRODUCTION | default "false"}}'

  package:
    summary: Packages a production build of the application
    cmds:
      - task: '{{if eq (.FORMAT | default "nsis") "msix"}}create:msix:package{{else}}create:nsis:installer{{end}}'
        vars:
          ARCH:
            ref: .ARCH
          BUILD_VERSION:
            ref: .BUILD_VERSION
          BUILD_TIME:
            ref: .BUILD_TIME
          GIT_COMMIT:
            ref: .GIT_COMMIT
          DISTRIBUTION:
            ref: .DISTRIBUTION
          MSIX_PACKAGE_NAME:
            ref: .MSIX_PACKAGE_NAME
          MSIX_PUBLISHER:
            ref: .MSIX_PUBLISHER
          MSIX_PUBLISHER_DISPLAY_NAME:
            ref: .MSIX_PUBLISHER_DISPLAY_NAME
          MSIX_DISPLAY_NAME:
            ref: .MSIX_DISPLAY_NAME
          MSIX_DESCRIPTION:
            ref: .MSIX_DESCRIPTION
    vars:
      FORMAT: '{{.FORMAT | default "nsis"}}'

  generate:syso:
    summary: Generates Windows `.syso` file
    dir: build
    cmds:
      - wails3 generate syso -arch {{.ARCH}} -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_{{.ARCH}}.syso
    vars:
      ARCH: '{{.ARCH}}'

  create:nsis:installer:
    summary: Creates an NSIS installer
    dir: build/windows/nsis
    deps:
      - task: build
        vars:
          ARCH:
            ref: .ARCH
          PRODUCTION: "true"
          BUILD_VERSION:
            ref: .BUILD_VERSION
          BUILD_TIME:
            ref: .BUILD_TIME
          GIT_COMMIT:
            ref: .GIT_COMMIT
    cmds:
      # Create the Microsoft WebView2 bootstrapper if it doesn't exist
      - wails3 generate webview2bootstrapper -dir "{{.ROOT_DIR}}/build/windows/nsis"
      - | 
        {{if eq OS "windows"}}
        makensis /INPUTCHARSET UTF8 -DARG_WAILS_{{.ARG_FLAG}}_BINARY="{{.ROOT_DIR}}\{{.BIN_DIR}}\{{.APP_NAME}}.exe" project.nsi
        {{else}}
        makensis /INPUTCHARSET UTF8 -DARG_WAILS_{{.ARG_FLAG}}_BINARY="{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}.exe" project.nsi
        {{end}}
    vars:
      ARCH: '{{.ARCH}}'
      ARG_FLAG: '{{if eq .ARCH "amd64"}}AMD64{{else}}ARM64{{end}}'

  create:nsis:installer:from-binary:
    summary: Creates an NSIS installer from an existing Windows binary
    dir: build/windows/nsis
    cmds:
      - wails3 generate webview2bootstrapper -dir "{{.ROOT_DIR}}/build/windows/nsis"
      - |
        {{if eq OS "windows"}}
        makensis /INPUTCHARSET UTF8 -DARG_WAILS_{{.ARG_FLAG}}_BINARY="{{.ROOT_DIR}}\{{.BIN_DIR}}\{{.APP_NAME}}.exe" project.nsi
        {{else}}
        makensis /INPUTCHARSET UTF8 -DARG_WAILS_{{.ARG_FLAG}}_BINARY="{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}.exe" project.nsi
        {{end}}
    vars:
      ARCH: '{{.ARCH}}'
      ARG_FLAG: '{{if eq .ARCH "amd64"}}AMD64{{else}}ARM64{{end}}'

  create:msix:package:
    summary: Creates an MSIX package
    deps:
      - task: build
        vars:
          ARCH:
            ref: .ARCH
          PRODUCTION: "true"
          BUILD_VERSION:
            ref: .BUILD_VERSION
          BUILD_TIME:
            ref: .BUILD_TIME
          GIT_COMMIT:
            ref: .GIT_COMMIT
          DISTRIBUTION: '{{.DISTRIBUTION | default "store"}}'
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File "{{.ROOT_DIR}}/build/windows/msix/package.ps1" -RootDir "{{.ROOT_DIR}}" -Arch "{{.ARCH}}" -Version "{{.BUILD_VERSION | default "0.1.0"}}" -PackageName "{{.MSIX_PACKAGE_NAME}}" -Publisher "{{.MSIX_PUBLISHER}}" -PublisherDisplayName "{{.MSIX_PUBLISHER_DISPLAY_NAME}}" -DisplayName "{{.MSIX_DISPLAY_NAME}}" -Description "{{.MSIX_DESCRIPTION}}" -OutPath "{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}-{{.ARCH}}.msix"
        platforms: [windows]
      - cmd: echo "MSIX packaging requires Windows SDK makeappx.exe on Windows." && exit 1
        platforms: [linux, darwin]
    vars:
      ARCH: '{{.ARCH}}'
      BUILD_VERSION: '{{.BUILD_VERSION | default "0.1.0"}}'
      MSIX_PACKAGE_NAME: '{{.MSIX_PACKAGE_NAME | default "CCX.Desktop"}}'
      MSIX_PUBLISHER: '{{.MSIX_PUBLISHER | default "CN=CCX"}}'
      MSIX_PUBLISHER_DISPLAY_NAME: '{{.MSIX_PUBLISHER_DISPLAY_NAME | default "CCX"}}'
      MSIX_DISPLAY_NAME: '{{.MSIX_DISPLAY_NAME | default "CCX Desktop"}}'
      MSIX_DESCRIPTION: '{{.MSIX_DESCRIPTION | default "Desktop shell for the CCX core gateway service."}}'

  install:msix:tools:
    summary: Checks tools required for MSIX packaging
    cmds:
      - cmd: powershell -NoProfile -Command "if (Get-Command makeappx.exe -ErrorAction SilentlyContinue) { exit 0 }; $kits = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\bin'; if (Test-Path $kits) { $tool = Get-ChildItem -Path $kits -Filter makeappx.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1; if ($tool) { exit 0 } }; throw 'makeappx.exe not found. Install the Windows SDK.'"
        platforms: [windows]
      - cmd: echo "MSIX packaging requires Windows SDK makeappx.exe on Windows."
        platforms: [linux, darwin]

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}.exe'
